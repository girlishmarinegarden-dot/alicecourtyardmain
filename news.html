<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News board</title>
  <link rel="preload" href="assets/bg.webm" as="video" type="video/webm" />
  <link rel="preload" href="assets/bg-poster.webp" as="image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="news.css" />
</head>
<body class="gal-body">
  <div id="gal-boot" class="gal-boot" aria-busy="true" aria-live="polite">
    <div class="gal-boot-inner">
      <span class="gal-boot-spinner" aria-hidden="true"></span>
      <span class="gal-boot-text">Loading background…</span>
    </div>
  </div>
  <div class="gal-stage" id="gal-stage">
    <!-- Put looped background video as assets/bg.webm (optional assets/bg.mp4 for Safari). Poster: assets/bg-poster.webp -->
    <video
      class="gal-bg-video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      poster="assets/bg-poster.webp"
      aria-hidden="true"
    >
      <source src="assets/bg.webm" type="video/webm" />
      <source src="assets/bg.mp4" type="video/mp4" />
    </video>
    <div class="gal-bg-fallback" aria-hidden="true"></div>
    <div class="gal-vignette" aria-hidden="true"></div>
    <div class="gal-sakura" aria-hidden="true"></div>

    <div class="gal-content">
      <a href="index.html" class="gal-back-home">← 返回庭院</a>
      <header class="gal-header">
        <div class="gal-header__ornament gal-header__ornament--tl" aria-hidden="true"></div>
        <div class="gal-header__ornament gal-header__ornament--tr" aria-hidden="true"></div>
        <h1 class="gal-title">News board</h1>
        <p class="gal-subtitle" id="status">Loading…</p>
      </header>

      <div class="ticker-wrap gal-panel">
        <div class="ticker-label">LIVE NEWS</div>
        <div class="ticker" id="ticker" aria-live="polite"></div>
      </div>

      <div id="unlock-panel" class="unlock-panel gal-panel" hidden>
        <span class="unlock-hint">Some rows are hidden (no on-image text). Enter the password to view:</span>
        <input type="password" id="unlock-pw" class="unlock-input" maxlength="64" autocomplete="off" placeholder="Password" />
        <button type="button" id="unlock-btn" class="unlock-btn">Unlock</button>
        <span id="unlock-err" class="unlock-err" aria-live="polite"></span>
      </div>

      <div id="error" class="err gal-panel" hidden></div>

      <div class="find-bar gal-panel" id="find-bar">
        <label for="find-input" class="find-label">Find text</label>
        <input type="search" id="find-input" class="find-input" placeholder="Filter by caption…" autocomplete="off" />
        <button type="button" id="find-clear" class="find-btn">Clear</button>
        <span id="find-count" class="find-count" aria-live="polite"></span>
      </div>

      <div class="feed gal-panel" id="feed"></div>

      <nav class="pagination gal-panel" id="pagination" aria-label="News pages" hidden>
        <button type="button" id="page-prev" class="page-btn">Previous</button>
        <span id="page-info" class="page-info"></span>
        <button type="button" id="page-next" class="page-btn">Next</button>
      </nav>
    </div>
  </div>

  <!-- 立绘：z-index 仅次于 #gal-boot；可拖动、可隐藏（body 末子，保证叠在最前） -->
  <figure class="gal-sprite gal-sprite-draggable stage-area-draggable" id="gal-sprite">
    <button type="button" id="gal-sprite-hide-btn" class="gal-sprite-hide-btn" aria-label="隐藏立绘">隐藏</button>
    <img class="gal-sprite-img" src="assets/alicecore.webp" alt="" decoding="async" width="800" height="1200" />
    <figcaption class="gal-sprite-placeholder">
      <span class="gal-sprite-placeholder__line">assets / alicecore.webp</span>
      <span class="gal-sprite-placeholder__hint">Drop your standee here</span>
    </figcaption>
  </figure>

  <script src="news.js"></script>
</body>
</html>
